<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f7df3; }

    .input-row button {
      padding: 10px 18px;
      background: #4f7df3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #3a66d8; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 6px;
      border: 1.5px solid #ddd;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #555;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f7df3;
      border-color: #4f7df3;
      color: #fff;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f7df3;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-all;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    li .del {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    li .del:hover { color: #e55; }

    .footer {
      margin-top: 16px;
      font-size: 0.82rem;
      color: #aaa;
      display: flex;
      justify-content: space-between;
    }

    .footer button {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 0.82rem;
      text-decoration: underline;
    }

    .footer button:hover { color: #e55; }

    .empty {
      text-align: center;
      color: #ccc;
      padding: 32px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>투두 리스트</h1>
    <div class="input-row">
      <input id="newTodo" type="text" placeholder="할 일을 입력하세요..." />
      <button onclick="addTodo()">추가</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('active', this)">진행 중</button>
      <button onclick="setFilter('done', this)">완료</button>
    </div>
    <ul id="list"></ul>
    <div class="footer">
      <span id="count"></span>
      <button onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('list');
      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (visible.length === 0) {
        list.innerHTML = '<li class="empty" style="border:none">항목이 없습니다.</li>';
      } else {
        list.innerHTML = visible.map(t => `
          <li class="${t.done ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span>${escHtml(t.text)}</span>
            <button class="del" onclick="remove(${t.id})">✕</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('count').textContent = `남은 항목: ${remaining}개`;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTodo() {
      const input = document.getElementById('newTodo');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      input.value = '';
      save(); render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save(); render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save(); render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save(); render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('newTodo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
